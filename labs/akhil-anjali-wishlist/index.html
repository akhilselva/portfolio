<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akhil & Anjali's Wishlist</title>

  <meta property="og:title" content="Akhil & Anjali's Wishlist" />
  <meta property="og:description" content="Pick up to 3 items you would like to gift us." />
  <meta property="og:image" content="https://akhilselva.com/labs/akhil-anjali-wishlist/akhil-anjali.jpg" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://akhilselva.com/labs/akhil-anjali-wishlist/" />

  <link href="https://cdn.jsdelivr.net/npm/vuetify@3.7.6/dist/vuetify.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div id="app" v-cloak>
    <v-app :theme="currentTheme" :data-theme="isDarkMode ? 'dark' : 'light'">
      <v-main>
        <v-container class="page-container">
          <v-card class="main-card" elevation="0">

            <!-- ── Header ── -->
            <v-card-title class="app-header">
              <div class="header-top">
                <h1 class="site-title">
                  <em>Akhil</em> &amp; <em>Anjali</em>
                </h1>
                <div class="header-nav">
                  <v-btn
                    class="nav-btn"
                    :class="{ active: !isAdminRoute }"
                    variant="text"
                    @click="goTo('#/wishlist')"
                  >
                    Wishlist
                  </v-btn>
                  <v-btn
                    class="nav-btn"
                    :class="{ active: isAdminRoute }"
                    variant="text"
                    @click="goTo('#/admin')"
                  >
                    Admin
                  </v-btn>
                  <v-btn
                    class="theme-btn"
                    icon
                    variant="text"
                    :title="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'"
                    @click="toggleTheme"
                  >
                    <v-icon>
                      {{ isDarkMode ? 'mdi-weather-sunny' : 'mdi-weather-night' }}
                    </v-icon>
                  </v-btn>
                </div>
              </div>
            </v-card-title>

            <!-- ═══════════════════════════════════
                 WISHLIST ROUTE
            ═══════════════════════════════════ -->
            <template v-if="!isAdminRoute">
              <div class="page-subtitle">Gift wishlist</div>

              <v-card-text class="card-content">

                <!-- Loading -->
                <div v-if="isLoading" class="loading-wrap">
                  <v-progress-circular indeterminate color="var(--tc-primary)" size="28" width="2"></v-progress-circular>
                  <span>Loading wishlist…</span>
                </div>

                <template v-else>
                  <!-- Alerts -->
                  <div v-if="infoMessage" class="tc-alert info mb-4 pa-3">
                    <span class="mdi mdi-information-outline me-2"></span>{{ infoMessage }}
                  </div>
                  <div v-if="successMessage" class="tc-alert success mb-4 pa-3">
                    <span class="mdi mdi-check-circle-outline me-2"></span>{{ successMessage }}
                  </div>
                  <div v-if="errorMessage" class="tc-alert error mb-4 pa-3">
                    <span class="mdi mdi-alert-circle-outline me-2"></span>{{ errorMessage }}
                  </div>

                  <!-- Selection counter -->
                  <div class="selection-badge">
                    <span class="badge-count">{{ selectedCount }}</span>
                    <span>of 3 items selected</span>
                  </div>

                  <!-- Item grid -->
                  <v-row dense class="mb-2">
                    <v-col
                      v-for="item in wishlistItems"
                      :key="item.id"
                      cols="12"
                      sm="6"
                    >
                      <v-card
                        class="item-card"
                        :class="{ 'is-selected': isSelected(item.id) }"
                        elevation="0"
                      >
                        <v-card-title class="item-name pt-4 px-4 pb-0">
                          {{ item.name }}
                        </v-card-title>

                        <v-card-subtitle class="item-added-by px-4 pt-1 pb-0">
                          Added by {{ item.addedBy }}
                        </v-card-subtitle>

                        <v-card-text class="item-description px-4 pt-3 pb-2">
                          {{ item.description }}

                          <div class="mt-3">
                            <span
                              v-if="getCommittedNames(item.id).length"
                              class="commitment-chip committed"
                            >
                              <span class="mdi mdi-gift-outline me-1"></span>
                              {{ getCommittedNames(item.id).join(', ') }}
                            </span>
                            <span v-else class="commitment-chip uncommitted">
                              Not committed yet
                            </span>
                          </div>
                        </v-card-text>

                        <v-card-actions class="item-actions">
                          <v-btn
                            v-if="item.url"
                            :href="item.url"
                            target="_blank"
                            variant="text"
                            class="view-link-btn"
                            prepend-icon="mdi-open-in-new"
                            size="small"
                          >
                            View item
                          </v-btn>

                          <v-spacer></v-spacer>

                          <v-btn
                            class="select-btn"
                            :class="isSelected(item.id) ? 'selected' : 'unselected'"
                            :variant="isSelected(item.id) ? 'flat' : 'outlined'"
                            size="small"
                            @click="toggleItem(item.id)"
                          >
                            <span class="mdi me-1" :class="isSelected(item.id) ? 'mdi-check' : 'mdi-plus'"></span>
                            {{ isSelected(item.id) ? 'Selected' : 'Select' }}
                          </v-btn>
                        </v-card-actions>
                      </v-card>
                    </v-col>
                  </v-row>

                  <v-divider class="tc-divider"></v-divider>

                  <!-- Privacy note -->
                  <div class="privacy-note">
                    <span class="mdi mdi-shield-lock-outline"></span>
                    Your phone number is used only to help you update or remove your own selection later. It will not be shown publicly.
                  </div>

                  <!-- Form -->
                  <v-row align="end">
                    <v-col cols="12" sm="4">
                      <v-text-field
                        v-model="visitorName"
                        label="Your name"
                        variant="outlined"
                        density="comfortable"
                        clearable
                        hide-details
                      ></v-text-field>
                    </v-col>

                    <v-col cols="12" sm="4">
                      <v-text-field
                        v-model="visitorPhone"
                        label="Phone number"
                        variant="outlined"
                        density="comfortable"
                        clearable
                        type="tel"
                        hide-details
                      ></v-text-field>
                    </v-col>

                    <v-col cols="12" sm="4">
                      <div class="form-actions">
                        <v-btn
                          class="btn-secondary"
                          variant="flat"
                          :loading="isLookupLoading"
                          :disabled="!canLookupCommitment || isLookupLoading"
                          @click="lookupCommitment"
                        >
                          <span class="mdi mdi-magnify me-1"></span> Find
                        </v-btn>

                        <v-btn
                          class="btn-save"
                          variant="flat"
                          :loading="isSaveLoading"
                          :disabled="!canSubmitCommitment || isSaveLoading"
                          @click="submitCommitment"
                        >
                          <span class="mdi mdi-content-save-outline me-1"></span> Save
                        </v-btn>

                        <v-btn
                          class="btn-danger"
                          variant="outlined"
                          :loading="isClearLoading"
                          :disabled="!canLookupCommitment || isClearLoading"
                          @click="clearCommitment"
                        >
                          Clear
                        </v-btn>
                      </div>
                    </v-col>
                  </v-row>
                </template>

              </v-card-text>
            </template>

            <!-- ═══════════════════════════════════
                 ADMIN ROUTE
            ═══════════════════════════════════ -->
            <template v-else>
              <div class="page-subtitle">Admin area</div>

              <v-card-text class="card-content">

                <!-- Alerts -->
                <div v-if="successMessage" class="tc-alert success mb-4 pa-3">
                  <span class="mdi mdi-check-circle-outline me-2"></span>{{ successMessage }}
                </div>
                <div v-if="errorMessage" class="tc-alert error mb-4 pa-3">
                  <span class="mdi mdi-alert-circle-outline me-2"></span>{{ errorMessage }}
                </div>

                <!-- Login form -->
                <template v-if="!isAdminLoggedIn">
                  <v-row>
                    <v-col cols="12" sm="4">
                      <v-select
                        v-model="adminUser"
                        label="Admin user"
                        :items="['akhil', 'anjali']"
                        variant="outlined"
                        density="comfortable"
                        hide-details
                      ></v-select>
                    </v-col>

                    <v-col cols="12" sm="4">
                      <v-text-field
                        v-model="adminPassword"
                        label="Password"
                        type="password"
                        variant="outlined"
                        density="comfortable"
                        hide-details
                      ></v-text-field>
                    </v-col>

                    <v-col cols="12" sm="4">
                      <v-btn
                        class="btn-save"
                        variant="flat"
                        size="large"
                        :loading="isAdminLoginLoading"
                        :disabled="!canAdminLogin || isAdminLoginLoading"
                        @click="adminLogin"
                      >
                        Login
                      </v-btn>
                    </v-col>
                  </v-row>
                </template>

                <!-- Logged-in admin panel -->
                <template v-else>
                  <div class="admin-badge">
                    <span class="mdi mdi-account-circle-outline"></span>
                    Logged in as {{ adminLoggedInUser }}
                  </div>

                  <v-row>
                    <v-col cols="12" sm="4">
                      <v-text-field
                        v-model="adminItemName"
                        label="Item name"
                        variant="outlined"
                        density="comfortable"
                        clearable
                        hide-details
                      ></v-text-field>
                    </v-col>

                    <v-col cols="12" sm="4">
                      <v-text-field
                        v-model="adminItemUrl"
                        label="Item URL"
                        variant="outlined"
                        density="comfortable"
                        clearable
                        hide-details
                      ></v-text-field>
                    </v-col>

                    <v-col cols="12" sm="4">
                      <v-text-field
                        v-model="adminItemDescription"
                        label="Description"
                        variant="outlined"
                        density="comfortable"
                        clearable
                        hide-details
                      ></v-text-field>
                    </v-col>
                  </v-row>

                  <div class="form-actions mt-4">
                    <v-btn
                      class="btn-save"
                      variant="flat"
                      :loading="isAdminAddLoading"
                      :disabled="!canAddAdminItem || isAdminAddLoading"
                      @click="addAdminItem"
                    >
                      <span class="mdi mdi-plus me-1"></span> Add item
                    </v-btn>

                    <v-btn
                      class="btn-danger"
                      variant="outlined"
                      @click="adminLogout"
                    >
                      <span class="mdi mdi-logout me-1"></span> Logout
                    </v-btn>
                  </div>
                </template>

              </v-card-text>
            </template>

          </v-card>
        </v-container>
      </v-main>
    </v-app>
  </div>

  <script src="https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@3.7.6/dist/vuetify.min.js"></script>
  <script src="./app.js"></script>
</body>

</html>
